<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Video Summarizer | Premium Insights</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-glow"></div>
    <div class="container">
        <header>
            <h1>Topic Shift Video Summarizer</h1>
        </header>

        <main>
            <section class="upload-section">
                <div id="drop-zone" class="glass-card">
                    <div class="upload-icon">+</div>
                    <p>Drag & Drop Video or <span>Browse Files</span></p>
                    <input type="file" id="file-input" hidden accept="video/*">
                </div>
                
                <div class="divider"><span>OR</span></div>
                
                <div class="youtube-input glass-card">
                    <input type="text" id="youtube-url" placeholder="Paste YouTube URL here...">
                    <button id="process-yt-btn">Analyze URL</button>
                </div>
            </section>

            <section id="progress-section" class="status-section hidden">
                <div class="glass-card">
                    <h3>Processing Video...</h3>
                    <div class="progress-container">
                        <div id="progress-bar" class="progress-bar"></div>
                    </div>
                    <p id="status-text">Uploading to server...</p>
                </div>
            </section>

            <section id="result-section" class="summary-section hidden">
                <div class="glass-card">
                    <h2>Video Summary Report</h2>
                    <div id="summary-content" class="markdown-body">
                        <!-- Summary will be injected here -->
                    </div>
                    <button id="reset-btn" class="secondary-btn">New Analysis</button>
                </div>
            </section>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/static/script.js"></script>
</body>
</html>
